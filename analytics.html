<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>DayPal Analytics Test Dashboard</title>
  <style>
    :root{--bg:#000;--surface:#1d1d1d;--text:#fff;--muted:#bdbdbd;--border:#444;--focus:#00aaff;--danger:#ff5a4f}
    *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:14px/1.4 Arial,sans-serif}.page{width:min(100%,900px);margin:auto;padding:18px}h1{font-size:26px;margin:0 0 4px}.intro{color:var(--muted);margin:0 0 18px}.card{background:var(--surface);border:1px solid var(--border);padding:16px;margin:0 0 12px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button{border:0;min-height:40px;background:var(--focus);color:#000;font-weight:800;padding:0 16px;cursor:pointer}.secondary{background:#555;color:#fff}.danger{background:var(--danger);color:#000}.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px}.kpi{background:#050505;border:1px solid #333;padding:12px}.kpi b{display:block;font-size:22px}.muted{color:var(--muted)}table{width:100%;border-collapse:collapse;background:#050505}th,td{border-bottom:1px solid #333;text-align:left;padding:8px;vertical-align:top}th{color:var(--muted);font-size:12px}pre{white-space:pre-wrap;margin:0}.empty{color:var(--muted);padding:12px;background:#050505;border:1px solid #333}.small{font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <main class="page">
    <h1>DayPal Analytics Test Dashboard</h1>
    <p class="intro">Local dashboard for QA. It reads test analytics events stored by the DayPal config page in this browser.</p>
    <section class="card row">
      <button id="refresh" type="button">Refresh</button>
      <button class="secondary" id="seed" type="button">Add sample event</button>
      <button class="secondary" id="export" type="button">Export JSON</button>
      <button class="danger" id="clear" type="button">Clear events</button>
    </section>
    <section class="card"><h2>Summary</h2><div class="kpis" id="summary"></div><p class="small">Storage key: <code>daypal_analytics_events</code></p></section>
    <section class="card"><h2>Event counts</h2><div id="counts"></div></section>
    <section class="card"><h2>Recent events</h2><div id="events"></div></section>
  </main>
  <script>
    const KEY='daypal_analytics_events',$=id=>document.getElementById(id);
    function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch(e){return[]}}
    function save(events){localStorage.setItem(KEY,JSON.stringify(events.slice(-200)))}
    function esc(v){return String(v==null?'':v).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
    function render(){const events=load(),counts={};events.forEach(e=>{counts[e.name||'unknown']=(counts[e.name||'unknown']||0)+1});const names=Object.keys(counts).sort();$('summary').innerHTML='<div class="kpi"><span class="muted">Total events</span><b>'+events.length+'</b></div><div class="kpi"><span class="muted">Event types</span><b>'+names.length+'</b></div><div class="kpi"><span class="muted">Latest event</span><b style="font-size:14px">'+esc(events.length?(events[events.length-1].name||'unknown'):'None')+'</b></div>';$('counts').innerHTML=names.length?'<table><thead><tr><th>Event</th><th>Count</th></tr></thead><tbody>'+names.map(n=>'<tr><td>'+esc(n)+'</td><td>'+counts[n]+'</td></tr>').join('')+'</tbody></table>':'<div class="empty">No events yet.</div>';$('events').innerHTML=events.length?'<table><thead><tr><th>Time</th><th>Name</th><th>Data</th></tr></thead><tbody>'+events.slice().reverse().slice(0,50).map(e=>'<tr><td>'+esc(e.timestamp||e.ts||'')+'</td><td>'+esc(e.name||'unknown')+'</td><td><pre>'+esc(JSON.stringify(e.data||{},null,2))+'</pre></td></tr>').join('')+'</tbody></table>':'<div class="empty">No events yet. Open the config page, save settings, toggle controls, or use Add sample event.</div>'}
    $('refresh').onclick=render;$('seed').onclick=()=>{const events=load();events.push({name:'qa_sample_event',data:{source:'analytics_dashboard'},timestamp:new Date().toISOString()});save(events);render()};$('export').onclick=()=>{const blob=new Blob([JSON.stringify(load(),null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='daypal-analytics-events.json';a.click();URL.revokeObjectURL(url)};$('clear').onclick=()=>{if(confirm('Clear local DayPal analytics test events?')){localStorage.removeItem(KEY);render()}};render();
  </script>
</body>
</html>
